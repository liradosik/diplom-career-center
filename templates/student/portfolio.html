{% extends 'base_dashboard.html' %}
{% block content %}
<div class="grid two">
  <div class="card">
    <h2>Добавить запись портфолио</h2>
    <form method="post" class="form">
      <div><label>Название</label><input name="title" required></div>
      <div><label>Описание</label><textarea name="description"></textarea></div>
      <div><label>Ссылка</label><input name="link"></div>
      <button class="btn" type="submit">Добавить</button>
    </form>
  </div>
  <div class="card">
    <h2>Мои записи</h2>
    {% for entry in entries %}
      <div style="padding:10px 0; border-bottom:1px solid #eee;">
        <strong>{{ entry.title }}</strong>
        <span class="status {{ entry.status }}">{{ entry.status }}</span>
        <p>{{ entry.description }}</p>
      </div>
    {% else %}<p>Записей пока нет.</p>{% endfor %}
  </div>
</div>
{% endblock %}
