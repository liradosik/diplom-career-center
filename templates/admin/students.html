{% extends 'base_dashboard.html' %}
{% block content %}
<div class="grid two">
  <div class="card">
    <h2>Создать аккаунт студента</h2>
    <form method="post" class="form">
      <div><label>Email</label><input type="email" name="email" required></div>
      <div><label>Пароль</label><input name="password" required></div>
      <div><label>ФИО</label><input name="full_name" required></div>
      <div><label>Группа</label><input name="group_name"></div>
      <div><label>Куратор</label>
        <select name="curator_id">
          <option value="">Без куратора</option>
          {% for curator in curators %}<option value="{{ curator.id }}">{{ curator.full_name }}</option>{% endfor %}
        </select>
      </div>
      <button class="btn" type="submit">Создать</button>
    </form>
  </div>
  <div class="card">
    <h2>Список студентов</h2>
    {% for student in students %}
      <p>{{ student.full_name }} ({{ student.email }}) — группа {{ student.group_name or 'не указана' }}</p>
    {% else %}<p>Студентов пока нет.</p>{% endfor %}
  </div>
</div>
{% endblock %}
