<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Центр карьеры ИРКПО{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="top">
  <div class="container row">
    <div class="logo"><img src="{{ url_for('static', filename='images/logo.svg') }}" alt="logo"> Центр карьеры ИРКПО</div>
    <div>
      {% if current_user.is_authenticated %}
        <a class="btn light" href="{{ url_for('logout') }}">Выйти</a>
      {% else %}
        <a class="btn" href="{{ url_for('login') }}">Войти</a>
      {% endif %}
    </div>
  </div>
</header>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
</div>
{% block content %}{% endblock %}
</body>
</html>
