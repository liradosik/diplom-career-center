{% extends 'base_dashboard.html' %}
{% block content %}
<div class="card">
  <h2>Портфолио: {{ student.full_name }}</h2>
  {% for entry in entries %}
    <div style="border-bottom:1px solid #eee; padding:12px 0;">
      <strong>{{ entry.title }}</strong> <span class="status {{ entry.status }}">{{ entry.status }}</span>
      <p>{{ entry.description }}</p>
      {% if entry.link %}<p><a href="{{ entry.link }}" target="_blank">{{ entry.link }}</a></p>{% endif %}
      <form method="post" class="form">
        <input type="hidden" name="entry_id" value="{{ entry.id }}">
        <textarea name="curator_comment" placeholder="Комментарий куратора"></textarea>
        <div style="display:flex; gap:8px;">
          <button class="btn" name="action" value="approve" type="submit">Подтвердить</button>
          <button class="btn gray" name="action" value="reject" type="submit">Отклонить</button>
        </div>
      </form>
    </div>
  {% else %}<p>Записей пока нет.</p>{% endfor %}
</div>
{% endblock %}
